<title>AiGROW 生徒画面プロトタイプ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* ── Design tokens (spec-bound) ── */
    --blue:        #0096fa;   /* Primary Blue */
    --blue-dark:   #0069b5;   /* Primary Dark */
    --blue-soft:   #e7f4ff;   /* tinted surface */
    --blue-softer: #f2f9ff;
    --orange:      #FC8524;   /* Brand Orange — logo & CTA */
    --orange-dark: #ef6f0a;
    --green:       #00c853;   /* Success */
    --green-soft:  #e4f9ec;
    --bg:          #eeeeee;    /* page background */
    --surface:     #ffffff;   /* cards */
    --text:        #464a4d;   /* text primary */
    --text-sub:    #8c8c8c;   /* text secondary */
    --border:      #d6d6d6;
    --border-soft: #ececec;

    --pink:   #ff5d8f;
    --purple: #8a6cf0;
    --yellow: #ffc224;

    --r:    8px;    /* spec radius — small/clean */
    --r-md: 14px;
    --r-lg: 20px;
    --r-xl: 28px;

    --shadow-sm: 0 1px 3px rgba(20,40,60,.08);
    --shadow:    0 4px 14px rgba(20,40,60,.10);
    --shadow-lg: 0 12px 34px rgba(20,40,60,.16);
    --shadow-blue: 0 8px 20px rgba(0,150,250,.30);
    --shadow-orange: 0 8px 20px rgba(252,133,36,.34);

    --font: 'Noto Sans JP', system-ui, sans-serif;
    --font-round: 'M PLUS Rounded 1c', 'Noto Sans JP', sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    font-family: var(--font);
    color: var(--text);
    /* tablet background — visible around the app card */
    background:
      radial-gradient(1200px 800px at 18% -10%, #d9ecff 0%, transparent 55%),
      radial-gradient(1000px 700px at 105% 8%, #ffe9d6 0%, transparent 50%),
      #dfe6ec;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #root {
    width: 100%; height: 100%;
    display: flex; justify-content: center; align-items: stretch;
  }

  /* ── Responsive app root (no device frame) ── */
  #app-root {
    width: 100%;
    max-width: 480px;      /* cap on tablet — fills phone width naturally */
    height: 100%;
    display: flex; flex-direction: column;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  /* subtle card shadow on tablet so the app area pops off the bg */
  @media (min-width: 481px) {
    #app-root { box-shadow: 0 0 60px rgba(10,30,60,.18); }
  }

  /* ── Safe area spacer (replaces fake status bar) ── */
  .safe-area-top {
    flex-shrink: 0;
    height: env(safe-area-inset-top, 0px);
    background: transparent;
  }

  /* ── App screen container ── */
  .screen {
    flex: 1; min-height: 0;
    display: flex; flex-direction: column;
    position: relative;
    background: var(--bg);
  }
  .screen--white { background: var(--surface); }

  .scroll {
    flex: 1; min-height: 0;
    overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }
  .scroll::-webkit-scrollbar { width: 0; }
  .pad { padding: 16px; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  /* When a scroll area is itself a flex column, its children must keep natural
     height and let the container scroll — never shrink/clip. */
  .scroll.stack > * { flex-shrink: 0; }

  /* ── App header ── */
  .appbar {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border-soft);
    position: relative; z-index: 40;
  }
  .logo { font-family: var(--font-round); font-weight: 900; font-size: 21px; letter-spacing: -.5px; display: flex; align-items: baseline; gap: 1px; }
  .logo .ai   { color: var(--orange); }
  .logo .grow { color: var(--text); }
  .logo .sub  { font-size: 11px; color: var(--text-sub); font-weight: 700; margin-left: 5px; }

  /* ── Buttons ── */
  .btn {
    font-family: var(--font-round); font-weight: 800;
    border: none; cursor: pointer; border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 22px; font-size: 16px; line-height: 1;
    transition: transform .12s ease, box-shadow .15s ease, background .15s;
    -webkit-tap-highlight-color: transparent; width: 100%;
  }
  .btn:active { transform: scale(.96); }
  .btn--cta    { background: linear-gradient(135deg, #ff9d3f, var(--orange)); color: #fff; box-shadow: var(--shadow-orange); }
  .btn--cta:active { box-shadow: 0 3px 10px rgba(252,133,36,.34); }
  .btn--primary{ background: linear-gradient(135deg, #1aa6ff, var(--blue)); color: #fff; box-shadow: var(--shadow-blue); }
  .btn--green  { background: linear-gradient(135deg, #18d96a, var(--green)); color: #fff; box-shadow: 0 8px 20px rgba(0,200,83,.30); }
  .btn--outline{ background: #fff; color: var(--blue); box-shadow: inset 0 0 0 2px var(--blue); }
  .btn--ghost  { background: var(--blue-soft); color: var(--blue-dark); }
  .btn--lg { padding: 17px 26px; font-size: 17px; }
  .btn--sm { padding: 10px 16px; font-size: 14px; }
  .btn:disabled { background: var(--border); color: #b3b3b3; box-shadow: none; cursor: default; }

  /* ── Cards ── */
  .card {
    background: var(--surface); border-radius: var(--r-lg);
    box-shadow: var(--shadow-sm); padding: 16px;
  }
  .card--flat { box-shadow: none; border: 1px solid var(--border-soft); }

  /* ── Inputs ── */
  .field {
    width: 100%; font-family: var(--font); font-size: 15px; color: var(--text);
    background: #fff; border: 2px solid var(--border); border-radius: var(--r-md);
    padding: 14px 16px; transition: border-color .15s, box-shadow .15s;
  }
  .field::placeholder { color: #b7bcc0; }
  .field:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 4px var(--blue-soft); }

  /* ── Bottom nav ── */
  .botnav {
    flex-shrink: 0;
    min-height: 56px;
    height: calc(56px + env(safe-area-inset-bottom, 0px));
    padding-bottom: env(safe-area-inset-bottom, 0px);
    display: grid; grid-template-columns: repeat(5, 1fr);
    background: var(--surface);
    border-top: 1px solid var(--border-soft);
    box-shadow: 0 -2px 14px rgba(20,40,60,.05);
    position: relative; z-index: 40;
  }
  .botnav__item {
    border: none; background: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    font-family: var(--font-round); font-weight: 700; font-size: 9.5px; white-space: nowrap;
    color: #b0b6bb; transition: color .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .botnav__item.active { color: var(--blue); }
  .botnav__icon { position: relative; display: flex; }
  .botnav__dot {
    position: absolute; top: -2px; right: -4px; width: 8px; height: 8px;
    background: var(--orange); border-radius: 50%; border: 2px solid #fff;
  }

  /* ── Misc ── */
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--font-round); font-weight: 700; font-size: 12px;
    padding: 5px 11px; border-radius: 999px;
  }
  .progress { height: 10px; background: #e3e7ea; border-radius: 999px; overflow: hidden; }
  .progress__fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--blue), #4db8ff); transition: width .6s cubic-bezier(.2,.8,.2,1); }

  h1,h2,h3 { font-family: var(--font-round); }

  /* Resting state is always fully visible. The entrance animates transform only —
     opacity never drops, so content can never get stuck invisible in throttled
     tabs, print, or reduced-motion. */
  .fade-in { opacity: 1; }
  @media (prefers-reduced-motion: no-preference) {
    .fade-in { animation: fadeIn .4s cubic-bezier(.2,.8,.2,1); }
  }
  @keyframes fadeIn { from { transform: translateY(10px); } to { transform: none; } }
  @keyframes floaty { 0%,100% { transform: translateY(0) rotate(20deg); } 50% { transform: translateY(-12px) rotate(-10deg); } }
  @keyframes typing { 0%,60%,100% { transform: translateY(0); opacity: .4; } 30% { transform: translateY(-4px); opacity: 1; } }
  @keyframes chipPop { 0% { opacity:0; transform:scale(.6); } 30% { opacity:1; transform:scale(1.1); } 65% { opacity:1; transform:scale(1); } 100% { opacity:0; transform:scale(.85) translateY(-6px); } }

  /* hide tweak panel injected root cleanly */
  #tweaks-root { position: fixed; z-index: 9999; }
</style>
